<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNGU FX | Premium Forex Trading Academy</title>
    
    <!-- Premium Google Fonts & Vector Icon Packs -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        /* CORE MODERN FINTECH THEME STRUCTURAL DESIGN */
        :root {
            --bg-base: #06080c;
            --bg-card: #0b0f17;
            --bg-input: #121824;
            --accent-gold: #e5b842;
            --gold-glow: rgba(229, 184, 66, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --neon-green: #10b981;
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* LIVE ABSTRACT TRADING GRID OVERLAY SYSTEM */
        .grid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 80% 20%, #111a2e 0%, #06080c 100%);
        }

        .matrix-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glow-filter-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(229, 184, 66, 0.04) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 92%;
            max-width: 1300px;
            margin: auto;
        }

        /* HEADER & NAVIGATION INTERFACE */
        header {
            background-color: rgba(6, 8, 12, 0.75);
            backdrop-filter: blur(20px);
            padding: 22px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-logo span {
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--gold-glow);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        nav ul li a:hover, nav ul li a.active-link {
            color: var(--text-primary);
        }

        .btn-portal-toggle {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .btn-portal-toggle:hover {
            background: var(--accent-gold);
            color: var(--bg-base);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* PUBLIC MARKETING STAGE VIEWS */
        .public-marketing-zone {
            display: block;
        }

        .hero-banner {
            padding: 80px 0 40px 0;
            text-align: center;
        }

        .hero-banner h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            letter-spacing: -1px;
            line-height: 1.15;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 30%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-banner p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 35px auto;
        }

        .cta-btn {
            background: linear-gradient(135deg, #e5b842 0%, #c4962b 100%);
            color: #000;
            padding: 16px 36px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 6px;
            display: inline-block;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 25px rgba(229, 184, 66, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(229, 184, 66, 0.4);
        }

        /* INDUSTRIAL TRADING VIEW GRAPHIC CONTAINER */
        .ticker-widget-frame {
            margin: 50px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            height: 480px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* CORE VALUE CARDS */
        .value-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 60px 0;
        }

        .value-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 12px;
            transition: border-color 0.3s ease, transform 0.3s ease;
        }

        .value-card:hover {
            border-color: rgba(229, 184, 66, 0.4);
            transform: translateY(-4px);
        }

        .value-card .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(229, 184, 66, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: var(--accent-gold);
            font-size: 20px;
        }

        .value-card h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .value-card p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ENROLLMENT & GATEWAY SECTIONS */
        .enrollment-panel {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 80px 0;
        }

        .form-scaffold {
            max-width: 580px;
            margin: auto;
        }

        .form-scaffold h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
        }

        .form-scaffold p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 35px;
        }

        .input-row {
            width: 100%;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        .input-row:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        .badge-strip {
            background: var(--bg-base);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--neon-green);
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            border: 1px dashed rgba(255,255,255,0.08);
        }

        .notification-banner {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        .banner-loading { display: block; background: #261f0c; border: 1px solid var(--accent-gold); color: var(--accent-gold); }
        .banner-complete { display: block; background: #0c261c; border: 1px solid var(--neon-green); color: var(--neon-green); }

        .submit-trigger {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
        }

        /* STUDENT HUB SYSTEM DASHBOARD */
        .student-portal-view {
            display: none;
            padding: 40px 0;
        }

        .portal-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .portal-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            height: fit-content;
        }

        .profile-badge {
