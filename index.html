<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUNGU FX | Premium Forex Trading Academy</title>
    
    <!-- Premium Fonts and Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        /* CORE MODERN THEME ARCHITECTURE */
        :root {
            --bg-deep: #0a0d14;
            --bg-surface: #121722;
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.2);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --neon-green: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* HIGH CLASS LIVE ABSTRACT ANIMATED BACKGROUND GRID */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #161f33 0%, #0a0d14 100%);
        }

        .chart-grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.04;
            background-image: 
                linear-gradient(to right, #ffffff 1px, transparent 1px),
                linear-gradient(to bottom, #ffffff 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        /* HEADER & NAVIGATION */
        header {
            background-color: rgba(18, 23, 34, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 204, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        nav ul li a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--gold);
        }

        /* HERO SECTION */
        .hero {
            padding: 100px 0 60px 0;
            text-align: center;
            position: relative;
        }

        .hero-glow-point {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: var(--gold);
            filter: blur(150px);
            opacity: 0.12;
            z-index: -1;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 54px;
            line-height: 1.2;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ffffff 60%, #ffcc00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 19px;
            max-width: 750px;
            margin: 0 auto 35px auto;
            color: var(--text-muted);
        }

        .btn {
            background: linear-gradient(135deg, #ffcc00 0%, #e6b800 100%);
            color: #000000;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(255, 204, 0, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 204, 0, 0.5);
        }

        /* LIVE ADVANCED FINANCIAL GRAPHIC (INTEGRATED CHART WIDGET) */
        .live-chart-container {
            margin: 40px auto 60px auto;
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            height: 450px;
        }

        /* ACADEMY CARDS ARCHITECTURE */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        .feature-card {
            background: linear-gradient(145deg, #121722 0%, #171e2c 100%);
            padding: 40px 30px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(255, 204, 0, 0.1);
        }

        .feature-card i {
            font-size: 35px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .feature-card h3 {
            font-size: 22px;
            margin-bottom: 15px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .feature-card p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* PROGRAMS GRID WITH HOVER RANGES */
        .courses-section {
            padding: 60px 0;
        }

        .section-title {
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 38px;
            margin-bottom: 50px;
        }

        .section-title span {
            color: var(--gold);
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .course-box {
            background-color: var(--bg-surface);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .course-box.premium-tier {
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.15);
        }

        .badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            font-weight: 700;
            padding: 4px 15px;
            font-size: 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .course-box h4 {
            font-size: 24px;
            margin-bottom: 15px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .course-box p {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 25px;
        }

        .course-box .price {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* REGISTRATION & SECURE GATEWAY CHECKOUT */
        .checkout-section {
            background-color: var(--bg-surface);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 80px 0;
        }

        .form-container {
            max-width: 650px;
            margin: auto;
            text-align: center;
        }

        .form-container h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 34px;
            margin-bottom: 15px;
        }

        .form-container p {
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        form input, form select {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            background-color: var(--bg-deep);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 6px;
            font-size: 16px;
            transition: 0.3s;
        }

        form input:focus, form select:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .payment-methods-logos {
            background: var(--bg-deep);
            border: 1px dashed rgba(255, 254, 254, 0.15);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--neon-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-box {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
