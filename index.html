<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUNGU FX PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* LOGIN SCREEN */
#auth {
  position:fixed;
  width:100%;
  height:100%;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  padding:10px;
  margin:5px;
  width:200px;
}

button {
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
}

/* APP */
#app {
  display:none;
}

/* NAV */
.nav {
  background:#111827;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

/* CHAT */
.chat {
  margin:10px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  height:250px;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  overflow-y:auto;
}

.msg {
  background:#2563eb;
  padding:5px;
  margin:5px 0;
  border-radius:5px;
  width:fit-content;
}

.chat input {
  width:70%;
}

.chat button {
  width:25%;
}

/* WHATSAPP */
.wa {
  position:fixed;
  bottom:15px;
  right:15px;
  background:#25D366;
  padding:12px;
  border-radius:50px;
  color:white;
  text-decoration:none;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>BUNGU FX LOGIN</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login / Register</button>
</div>

<!-- APP -->
<div id="app">

<div class="nav">💎 BUNGU FX PRO TRADING</div>

<div class="grid" id="signals">
  <div class="card">Loading signals...</div>
</div>

<div class="chat">
  <h3>Live Chat 💬</h3>
  <div class="messages" id="chatBox"></div>

  <div style="display:flex;">
    <input id="msg" placeholder="message">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<a class="wa" href="https://wa.me/255798033596">WhatsApp</a>

<script>

/* LOGIN SYSTEM (LOCAL) */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    localStorage.setItem("user", u);
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    loadSignals();
  }
}

/* CHAT SYSTEM (LOCAL REALTIME SIMULATION) */
function send(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  let box = document.getElementById("chatBox");

  let div = document.createElement("div");
  div.className="msg";
  div.innerText = localStorage.getItem("user")+": "+msg;

  box.appendChild(div);
  document.getElementById("msg").value="";
}

/* FOREX API */
function loadSignals(){
  fetch("https://api.exchangerate.host/latest")
  .then(res=>res.json())
  .then(data=>{

    let grid = document.getElementById("signals");
    grid.innerHTML="";

    grid.innerHTML += `
      <div class="card">
        EUR/USD: ${data.rates.USD}
      </div>
      <div class="card">
        GBP/USD: ${data.rates.GBP}
      </div>
      <div class="card">
        XAU/USD: LIVE FX DATA
      </div>
    `;
  });
}

</script>

</body>
</html>
